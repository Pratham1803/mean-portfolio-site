<section>
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">Login to Admin Panel</h1>
        <form class="bg-gray-800 p-6 rounded-lg shadow-md" ng-submit="login()">
            <div class="mb-4">
                <label class="block text-gray-300 mb-2" for="email">Email</label>
                <input type="text" id="email" ng-model="credentials.email" required
                    class="w-full px-3 py-2 bg-gray-700 text-gray-200 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 mb-2" for="password">Password</label>
                <input type="password" id="password" ng-model="credentials.password" required
                    class="w-full px-3 py-2 bg-gray-700 text-gray-200 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">Login</button>
        </form>
    </div>
</section>
